name: Bug report
description: Report reproducible incorrect behavior.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach real memory databases, secrets, or personal data.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal steps and synthetic input data.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Memery version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python version, and relevant dependency versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
